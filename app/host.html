<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主持人控制台</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        #login-screen { background: white; width: 100%; max-width: 400px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 40px 30px; text-align: center; margin-top: 10vh; }
        #login-screen input { width: 100%; padding: 15px; font-size: 18px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        #login-screen button { width: 100%; background-color: #2c3e50; color: white; padding: 15px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        #login-screen button:hover { background-color: #1a252f; }
        #dashboard { display: none; width: 100%; max-width: 800px; }
        .dashboard-container { background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 30px; }
        h1 { text-align: center; color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 15px; margin-top: 0; }
        
        .status-bar { text-align: center; font-size: 24px; font-weight: bold; padding: 20px; border-radius: 10px; margin: 20px 0; }
        .status-closed { background-color: #fce4e4; color: #c0392b; }
        .status-open { background-color: #e8f8f5; color: #1abc9c; }
        .controls { display: flex; gap: 20px; justify-content: center; margin-bottom: 30px; }
        .controls button { padding: 15px 30px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; }
        .btn-open { background-color: #3498db; }
        .btn-close { background-color: #e74c3c; }
        .results { background: #fdfefe; border: 1px solid #bdc3c7; border-radius: 10px; padding: 20px; }
        .results h2 { margin-top: 0; color: #34495e; display: flex; justify-content: space-between; align-items: center;}
        .count-badge { background: #34495e; color: white; padding: 5px 10px; border-radius: 20px; font-size: 16px; }
        ol { font-size: 20px; line-height: 1.8; padding-left: 40px; }
        li { border-bottom: 1px dashed #ccc; padding: 10px 0; word-wrap: break-word; overflow-wrap: anywhere; word-break: break-all; }
        li span.name { font-weight: bold; color: #d35400; font-size: 22px;}
        li span.answer { color: #2980b9; display: block; margin-left: 10px; font-size: 18px; }
    </style>
</head>
<body>
    <div id="login-screen">
        <h2 style="margin-top: 0;">🔐 主持人登入</h2>
        <p style="color: #7f8c8d; font-size: 14px; margin-bottom: 20px;">請輸入密碼</p>
        <input type="password" id="host-password" placeholder="密碼" onkeypress="handleEnter(event)" />
        <button onclick="login()">登入控制台</button>
    </div>

    <div id="dashboard">
        <div class="dashboard-container">
            <h1>🎙️ 搶答大賽 - 主持人控制台</h1>
            <div id="status-bar" class="status-bar status-closed">目前狀態：未開放</div>
            <div class="controls">
                <button class="btn-open" onclick="sendAction('reset')">🟢 開放作答 (清除前次紀錄)</button>
                <button class="btn-close" onclick="sendAction('close')">🛑 鎖定作答</button>
            </div>
            <div class="results">
                <h2>🏆 成功送出名單 <span id="people-count" class="count-badge">0 人已答</span></h2>
                <ol id="rank-list"></ol>
            </div>
        </div>
    </div>

    <script>
        const wsProtocol = window.location.protocol === "https:" ? "wss" : "ws";
        const ws = new WebSocket(`${wsProtocol}://${window.location.host}/ws`);
        
        const loginScreen = document.getElementById('login-screen');
        const dashboard = document.getElementById('dashboard');
        const pwdInput = document.getElementById('host-password');
        const statusBar = document.getElementById('status-bar');
        const rankList = document.getElementById('rank-list');
        const countBadge = document.getElementById('people-count');

        function login() {
            const pwd = pwdInput.value.trim();
            if (!pwd) { alert("請輸入密碼！"); return; }
            ws.send(JSON.stringify({ action: "host_login", password: pwd }));
        }

        function handleEnter(e) { if (e.key === 'Enter') login(); }

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            if (data.type === 'login_result') {
                if (data.success) {
                    loginScreen.style.display = 'none';
                    dashboard.style.display = 'block';
                } else {
                    alert(data.msg);
                    pwdInput.value = '';
                }
            } 
            else if (data.type === 'state') {
                updateDashboard(data.is_open, data.winners);
            }
        };

        function updateDashboard(isOpen, winners) {
            if (isOpen) {
                statusBar.className = "status-bar status-open";
                statusBar.innerText = "目前狀態：🟢 開放作答中！";
            } else {
                statusBar.className = "status-bar status-closed";
                statusBar.innerText = "目前狀態：🛑 已鎖定";
            }

            countBadge.innerText = `${winners.length} 人已答`;
            rankList.innerHTML = '';
            
            if (winners.length === 0) {
                rankList.innerHTML = "<li style='border:none; color:#7f8c8d;'><i>目前尚無人作答</i></li>";
            } else {
                winners.forEach((winner, index) => {
                    const li = document.createElement('li');
                    li.innerHTML = `第 ${index + 1} 名：<span class="name">${winner.name}</span> <span class="answer">答案：${winner.answer}</span>`;
                    rankList.appendChild(li);
                });
            }
        }

        function sendAction(action) { ws.send(JSON.stringify({ action: action })); }
    </script>
</body>
</html>
